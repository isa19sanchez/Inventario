
<div class="container">
  <h1 class="titulo">Sistema de Inventario</h1>

  <div class="card-form">
    <h2>Agregar Producto</h2>

    <form (submit)="guardar()">
      <input
        type="text"
        placeholder="Nombre del producto"
        [(ngModel)]="nuevoProducto.nombre"
        name="nombre"
      />

      <input
        type="text"
        placeholder="Descripción"
        [(ngModel)]="nuevoProducto.descripcion"
        name="descripcion"
      />

      <input type="number" placeholder="Precio" [(ngModel)]="nuevoProducto.precio" name="precio" />

      <input type="number" placeholder="Stock" [(ngModel)]="nuevoProducto.stock" name="stock" />

      <button type="submit">Agregar Producto</button>
    </form>
  </div>

  <div class="tabla-container">
    <h2>Lista de Productos</h2>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of productos">
          <td>{{ p.nombre }}</td>
          <td>$ {{ p.precio }}</td>
          <td>{{ p.stock }}</td>

          <td>
            <button class="delete" (click)="eliminar(p.id_producto)">Eliminar</button>
          </td>
          
        </tr>
      </tbody>
    </table>
  </div>
</div>
