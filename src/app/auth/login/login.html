<div class="container mt-5">
  <div class="card p-4 shadow mx-auto" style="max-width: 400px;">

    <h3 class="text-center mb-4">Iniciar Sesión</h3>

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="user.email"
          name="email"
          required
        />
      </div>

      <div class="mb-3">
        <label>Contraseña</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="user.password"
          name="password"
          required
        />
      </div>

      <button type="submit" class="btn btn-success w-100">
        Iniciar sesión
      </button>

    </form>

  </div>
</div>
